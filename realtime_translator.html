<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム音声翻訳 EN → JA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #16213e;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
            flex-shrink: 0;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .controls { display: flex; gap: 10px; align-items: center; }

        button {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            border: 2px solid;
        }

        #btnRecord {
            background: #0f3460;
            border-color: #e94560;
            color: #e0e0e0;
        }
        #btnRecord:hover { background: #e94560; }
        #btnRecord.active { background: #e94560; }

        .rec-dot {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            flex-shrink: 0;
        }
        #btnRecord.active .rec-dot { animation: blink 1s ease-in-out infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        #btnSave {
            background: #0f3460;
            border-color: #53c0f0;
            color: #53c0f0;
        }
        #btnSave:hover { background: #53c0f0; color: #1a1a2e; }

        #btnClear {
            background: #0f3460;
            border-color: #555;
            color: #999;
        }
        #btnClear:hover { border-color: #999; color: #ccc; }

        /* ── Panels ── */
        .panels {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
        }

        .panel-left { border-right: 2px solid #0f3460; }

        .panel-header {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 12px 2px 10px;
            border-bottom: 1px solid #0f3460;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: #1a1a2e;
            z-index: 1;
        }

        #entriesLeft, #entriesRight {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entry {
            padding: 10px 14px;
            border-radius: 6px;
            background: #16213e;
            border-left: 3px solid #0f3460;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }

        .entry.interim {
            opacity: 0.55;
            border-left-color: #555;
            font-style: italic;
        }

        .entry.final-en { border-left-color: #e94560; }
        .entry.final-ja { border-left-color: #53c0f0; }

        .translating { color: #555; font-style: italic; }

        .empty-hint {
            color: #333;
            font-style: italic;
            text-align: center;
            padding: 48px 20px;
            font-size: 14px;
            line-height: 1.8;
        }

        /* ── Footer ── */
        footer {
            background: #16213e;
            padding: 9px 24px;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .status-dot.recording {
            background: #e94560;
            animation: blink 1s ease-in-out infinite;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div class="title">🎤 リアルタイム音声翻訳 &nbsp; EN → JA</div>
    <div class="controls">
        <button id="btnRecord" onclick="toggleRecording()">
            <span class="rec-dot"></span>
            <span id="btnLabel">録音開始</span>
        </button>
        <button id="btnSave" onclick="saveFile()">💾 保存</button>
        <button id="btnClear" onclick="clearAll()">🗑 クリア</button>
    </div>
</header>

<div class="panels">
    <div class="panel panel-left" id="panelLeft">
        <div class="panel-header">🇺🇸 English &nbsp;— 原文</div>
        <div id="entriesLeft">
            <div class="empty-hint">
                録音ボタンを押して開始してください<br>
                <span style="font-size:12px">Chrome または Edge が必要です</span>
            </div>
        </div>
    </div>

    <div class="panel panel-right" id="panelRight">
        <div class="panel-header">🇯🇵 日本語 — 翻訳</div>
        <div id="entriesRight">
            <div class="empty-hint">翻訳結果がここに表示されます</div>
        </div>
    </div>
</div>

<footer>
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">待機中</span>
</footer>

<script>
    // ── State ──────────────────────────────────────────────
    let isRecording = false;
    let recognition  = null;   // シングルトン: 一度だけ生成して使い回す
    let micStream    = null;   // getUserMedia で取得したストリーム (許可をキャッシュ)
    let entries      = [];   // { id, english, japanese, final }
    let interimId    = null;
    let idCounter    = 0;
    let scrollSync   = false;

    // ── Speech Recognition (初回のみ生成) ─────────────────
    function getRecognition() {
        if (recognition) return recognition;

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            alert('音声認識に対応していません。\nGoogle Chrome または Microsoft Edge を使用してください。');
            return null;
        }
        const rec = new SR();
        rec.lang            = 'en-US';
        rec.continuous      = true;
        rec.interimResults  = true;
        rec.maxAlternatives = 1;

        rec.onstart = () => setStatus('録音中…');

        rec.onresult = handleResult;

        rec.onerror = (e) => {
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            setStatus('エラー: ' + e.error);
        };

        // ラッチ: isRecording が true なら自動再起動
        rec.onend = () => {
            if (isRecording) {
                try { rec.start(); } catch (_) {}
            } else {
                setStatus('待機中');
            }
        };

        recognition = rec;
        return rec;
    }

    function handleResult(event) {
        let interim = '';
        let final_  = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
            const r = event.results[i];
            if (r.isFinal) final_  += r[0].transcript;
            else           interim += r[0].transcript;
        }

        if (final_.trim()) {
            if (interimId !== null) { removeEntry(interimId); interimId = null; }
            addFinalEntry(final_.trim());
        } else if (interim.trim()) {
            if (interimId !== null) {
                updateInterim(interimId, interim.trim());
            } else {
                interimId = addInterimEntry(interim.trim());
            }
        }
    }

    // ── Entry management ──────────────────────────────────
    function addFinalEntry(text) {
        const id = ++idCounter;
        entries.push({ id, english: text, japanese: '', final: true });
        renderEntry(id, text, false);
        translateAndFill(id, text);
        return id;
    }

    function addInterimEntry(text) {
        const id = ++idCounter;
        entries.push({ id, english: text, japanese: '', final: false });
        renderEntry(id, text, true);
        return id;
    }

    function updateInterim(id, text) {
        const e = entries.find(x => x.id === id);
        if (e) e.english = text;
        const el = document.getElementById('el-' + id);
        if (el) el.textContent = text;
    }

    function removeEntry(id) {
        entries = entries.filter(x => x.id !== id);
        const l = document.getElementById('el-'  + id);
        const r = document.getElementById('er-'  + id);
        if (l) l.remove();
        if (r) r.remove();
    }

    function renderEntry(id, text, interim) {
        clearHints();

        const lDiv = document.createElement('div');
        lDiv.id        = 'el-' + id;
        lDiv.className = 'entry ' + (interim ? 'interim' : 'final-en');
        lDiv.textContent = text;

        const rDiv = document.createElement('div');
        rDiv.id        = 'er-' + id;
        rDiv.className = 'entry ' + (interim ? 'interim' : '');
        rDiv.innerHTML = interim
            ? '<span class="translating">…</span>'
            : '<span class="translating">翻訳中…</span>';

        document.getElementById('entriesLeft').appendChild(lDiv);
        document.getElementById('entriesRight').appendChild(rDiv);
        scrollBoth();
    }

    // ── Translation ───────────────────────────────────────
    async function translateAndFill(id, text) {
        try {
            const ja = await googleTranslate(text);
            const e  = entries.find(x => x.id === id);
            if (e) e.japanese = ja;

            const rDiv = document.getElementById('er-' + id);
            if (rDiv) {
                rDiv.textContent = ja;
                rDiv.classList.add('final-ja');
            }
        } catch (err) {
            console.error(err);
            const rDiv = document.getElementById('er-' + id);
            if (rDiv) rDiv.innerHTML = '<span style="color:#e94560">翻訳エラー</span>';
        }
    }

    async function googleTranslate(text) {
        const url = 'https://translate.googleapis.com/translate_a/single'
            + '?client=gtx&sl=en&tl=ja&dt=t&q=' + encodeURIComponent(text);
        const res  = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        // data[0] = array of [translated, original, ...]
        return data[0].map(seg => seg[0]).join('');
    }

    // ── Toggle recording ──────────────────────────────────
    function toggleRecording() {
        isRecording ? stopRecording() : startRecording();
    }

    async function startRecording() {
        // マイク許可を事前取得してキャッシュ (2回目以降はダイアログが出ない)
        if (!micStream) {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert('マイクへのアクセスが拒否されました。\nブラウザの設定でマイクを許可してください。');
                return;
            }
        }

        const rec = getRecognition();
        if (!rec) return;

        isRecording = true;
        document.getElementById('btnRecord').classList.add('active');
        document.getElementById('btnLabel').textContent = '録音停止';
        document.getElementById('statusDot').classList.add('recording');

        try { rec.start(); } catch (_) {}
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('btnRecord').classList.remove('active');
        document.getElementById('btnLabel').textContent = '録音開始';
        document.getElementById('statusDot').classList.remove('recording');
        setStatus('待機中');

        interimId = null;
        if (recognition) { try { recognition.stop(); } catch (_) {} }
        // recognition インスタンスは破棄せず再利用する
    }

    // ── Save file ─────────────────────────────────────────
    async function saveFile() {
        const done = entries.filter(e => e.final && e.japanese);
        if (!done.length) { alert('保存するデータがありません。'); return; }

        const now   = new Date();
        const stamp = now.toLocaleString('ja-JP');
        const lines = [`リアルタイム翻訳記録 — ${stamp}`, '='.repeat(52), ''];
        for (const e of done) {
            lines.push(e.english);
            lines.push(e.japanese);
            lines.push('');
        }
        const content = lines.join('\n');
        const fname   = 'translation_' + now.toISOString().slice(0, 10) + '.txt';

        if ('showSaveFilePicker' in window) {
            try {
                const fh = await window.showSaveFilePicker({
                    suggestedName: fname,
                    types: [{ description: 'テキストファイル', accept: { 'text/plain': ['.txt'] } }]
                });
                const wr = await fh.createWritable();
                await wr.write('\uFEFF' + content);   // BOM for Windows メモ帳
                await wr.close();
                setStatus('保存しました: ' + fh.name, false);
            } catch (err) {
                if (err.name !== 'AbortError') { console.error(err); alert('保存に失敗しました。'); }
            }
        } else {
            // フォールバック: ダウンロード
            const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
            const a    = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(blob), download: fname
            });
            a.click();
            URL.revokeObjectURL(a.href);
            setStatus('ダウンロードしました: ' + fname, false);
        }
    }

    // ── Clear ─────────────────────────────────────────────
    function clearAll() {
        if (isRecording) stopRecording();
        entries = []; idCounter = 0; interimId = null;
        document.getElementById('entriesLeft').innerHTML =
            '<div class="empty-hint">録音ボタンを押して開始してください<br><span style="font-size:12px">Chrome または Edge が必要です</span></div>';
        document.getElementById('entriesRight').innerHTML =
            '<div class="empty-hint">翻訳結果がここに表示されます</div>';
    }

    // ── Helpers ───────────────────────────────────────────
    function clearHints() {
        ['entriesLeft', 'entriesRight'].forEach(id => {
            const h = document.getElementById(id).querySelector('.empty-hint');
            if (h) h.remove();
        });
    }

    function setStatus(text) {
        document.getElementById('statusText').textContent = text;
    }


    function scrollBoth() {
        const l = document.getElementById('panelLeft');
        const r = document.getElementById('panelRight');
        l.scrollTop = l.scrollHeight;
        r.scrollTop = r.scrollHeight;
    }

    // 左右パネルのスクロール同期
    ['panelLeft', 'panelRight'].forEach(id => {
        document.getElementById(id).addEventListener('scroll', function () {
            if (scrollSync) return;
            scrollSync = true;
            const other = id === 'panelLeft' ? 'panelRight' : 'panelLeft';
            document.getElementById(other).scrollTop = this.scrollTop;
            scrollSync = false;
        });
    });

    // ── Boot check ────────────────────────────────────────
    window.addEventListener('load', () => {
        if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
            setStatus('⚠️ 音声認識非対応ブラウザです。Chrome / Edge をご利用ください。');
            document.getElementById('btnRecord').disabled = true;
        }
    });
</script>
</body>
</html>
