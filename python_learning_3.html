    content: `
<h2>型ヒントで安全なコードを書く</h2>
<p>Python 3.5+ では<strong>型ヒント</strong>を使って変数・引数・戻り値の型を明示できます。実行時には無視されますが、バグの早期発見に役立ちます。</p>
<h3>基本の型ヒント</h3>
<div class="hl">def greet(name: str) -> str:
    return f"Hello, {name}"

age: int = 25
pi: float = 3.14
items: list[int] = [1, 2, 3]
mapping: dict[str, int] = {"a": 1}</div>
<h3>Optional と Union</h3>
<div class="hl">from typing import Optional, Union

# Optional[X] は X | None と同じ
def find(id: int) -> Optional[str]:
    ...

# Union: 複数の型を許容
def parse(val: Union[str, int]) -> float:
    return float(val)</div>
<h3>自作クラスの型ヒント</h3>
<div class="hl">class User:
    def __init__(self, name: str, age: int) -> None:
        self.name = name
        self.age = age

def get_adult(users: list[User]) -> list[User]:
    return [u for u in users if u.age >= 18]</div>
<div class="tip">型ヒントは mypy や Pylance などの静的解析ツールと組み合わせると強力です。IDE の補完精度も上がります。</div>
    `,
    code: `from typing import Optional, Union

# 基本の型ヒント
def add(a: int, b: int) -> int:
    return a + b

def repeat(text: str, times: int = 1) -> str:
    return text * times

print(add(3, 5))
print(repeat("Ha", 4))

# Optional: None を返すかもしれない関数
def find_user(users: list[dict], id: int) -> Optional[dict]:
    for u in users:
        if u["id"] == id:
            return u
    return None

db = [{"id": 1, "name": "太郎"}, {"id": 2, "name": "花子"}]
result = find_user(db, 2)
print(result)
print(find_user(db, 99))  # None

# Union
def stringify(val: Union[int, float, str]) -> str:
    return f"値={val!r} 型={type(val).__name__}"

for v in [42, 3.14, "hello"]:
    print(stringify(v))`,

    icon: "🗂️", level: "上級",
    content: `
<h2>データクラス（@dataclass）</h2>
<p><code>@dataclass</code> デコレータを使うと、<strong>__init__ / __repr__ / __eq__</strong> を自動生成してくれるクラスを簡単に作れます。</p>
<h3>通常クラスとの比較</h3>
<div class="hl"># 通常クラス（冗長）
class Point:
    def __init__(self, x: float, y: float):
        self.x = x
        self.y = y
    def __repr__(self):
        return f"Point(x={self.x}, y={self.y})"

# dataclass（シンプル）
from dataclasses import dataclass

@dataclass
class Point:
    x: float
    y: float</div>
<h3>便利なオプション</h3>
<div class="hl">@dataclass(frozen=True)  # イミュータブル（変更不可）
class Color:
    r: int
    g: int
    b: int

@dataclass(order=True)   # <, > で比較可能
class Score:
    value: int
    name: str</div>
<h3>field() でデフォルト値を制御</h3>
<div class="hl">from dataclasses import dataclass, field

@dataclass
class Student:
    name: str
    grades: list[int] = field(default_factory=list)
    active: bool = True</div>
<div class="tip">dataclass は設定クラス・データ転送オブジェクト（DTO）・イミュータブルな値オブジェクトに最適です。</div>
    `,
    code: `from dataclasses import dataclass, field
from typing import Optional

@dataclass
class Point:
    x: float
    y: float

    def distance_to(self, other: "Point") -> float:
        return ((self.x - other.x)**2 + (self.y - other.y)**2) ** 0.5

p1 = Point(0, 0)
p2 = Point(3, 4)
print(p1)
print(p2)
print(f"距離: {p1.distance_to(p2)}")
print(p1 == Point(0, 0))  # True

# frozen=True でイミュータブル
from dataclasses import dataclass as dc

@dc(frozen=True)
class Config:
    host: str
    port: int = 8080
    debug: bool = False

cfg = Config("localhost")
print(cfg)

# field で可変デフォルト値
@dataclass
class Team:
    name: str
    members: list[str] = field(default_factory=list)

    def add(self, member: str) -> None:
        self.members.append(member)

t = Team("Aチーム")
t.add("太郎")
t.add("花子")
print(t)`,

      q: "@dataclass が自動生成するメソッドはどれ？",

      ans: 1,
      explanation: "正解！ @dataclass はデフォルトで __init__, __repr__, __eq__ を自動生成します。frozen=True にすると __hash__ も生成されます。"

    title: "Protocol と抽象クラス",
    icon: "📜", level: "上級",
    content: `
<h2>インターフェースを定義する</h2>
<p>Pythonには2種類のインターフェース定義方法があります。</p>
<h3>抽象クラス（ABC）</h3>
<div class="hl">from abc import ABC, abstractmethod

class Shape(ABC):
    @abstractmethod
    def area(self) -> float: ...  # 実装を強制

    @abstractmethod
    def perimeter(self) -> float: ...

class Circle(Shape):
    def __init__(self, r: float):
        self.r = r
    def area(self) -> float:
        return 3.14159 * self.r ** 2
    def perimeter(self) -> float:
        return 2 * 3.14159 * self.r</div>
<h3>Protocol（構造的部分型）</h3>
<div class="hl">from typing import Protocol

class Drawable(Protocol):
    def draw(self) -> str: ...

# 継承しなくても draw() を持つクラスはすべて Drawable
class Circle:
    def draw(self) -> str:
        return "○"

def render(obj: Drawable) -> None:
    print(obj.draw())</div>
<div class="tip">ABC は「継承して使う」、Protocol は「メソッドの形が合えばOK（ダックタイピング）」です。Protocol の方が柔軟です。</div>
<div class="warn">ABC のサブクラスで @abstractmethod を実装しないとインスタンス化時に TypeError になります。</div>
    `,
    code: `from abc import ABC, abstractmethod
import math

class Shape(ABC):
    @abstractmethod
    def area(self) -> float: ...

    @abstractmethod
    def perimeter(self) -> float: ...

    def describe(self) -> str:
        return (f"{type(self).__name__}: "
                f"面積={self.area():.2f}, 周囲={self.perimeter():.2f}")

class Circle(Shape):
    def __init__(self, radius: float):
        self.radius = radius

    def area(self) -> float:
        return math.pi * self.radius ** 2

    def perimeter(self) -> float:
        return 2 * math.pi * self.radius

class Rectangle(Shape):
    def __init__(self, w: float, h: float):
        self.w, self.h = w, h

    def area(self) -> float:
        return self.w * self.h

    def perimeter(self) -> float:
        return 2 * (self.w + self.h)

shapes: list[Shape] = [Circle(5), Rectangle(4, 6), Circle(3)]
for s in shapes:
    print(s.describe())

# ABCは直接インスタンス化できないことを確認
try:
    s = Shape()
except TypeError as e:
    print(f"\n✅ 期待通りのエラー: {e}")`,

      opts: [
        "メソッドを非公開にする",
        "サブクラスに実装を強制する",
        "メソッドを削除する",
        "staticmethodにする"

      ans: 1,
      explanation: "正解！ @abstractmethod を付けると、サブクラスはそのメソッドを必ず実装しなければなりません。実装しないとインスタンス化でエラーになります。"
    }

  {
    chapter: "マジックメソッド",

    icon: "✨", level: "上級",
    content: `
<h2>クラスを演算子に対応させる（特殊メソッド）</h2>
<p><strong>ダンダーメソッド</strong>（__method__）を定義すると、組み込み演算子や関数にクラスを対応させられます。</p>
<h3>主な特殊メソッド</h3>
<div class="hl">__init__    オブジェクト初期化
__repr__    repr() / デバッグ表示
__str__     str() / print()
__len__     len()
__getitem__ obj[key]
__setitem__ obj[key] = value
__iter__    for x in obj
__next__    next(obj)
__add__     +
__mul__     *
__lt__      &lt;
__eq__      ==
__contains__ in 演算子
__call__    obj() で呼び出し可能</div>
<h3>例：ベクトルクラス</h3>
<div class="hl">class Vector:
    def __init__(self, x, y):
        self.x, self.y = x, y
    def __add__(self, other):
        return Vector(self.x+other.x, self.y+other.y)
    def __mul__(self, scalar):
        return Vector(self.x*scalar, self.y*scalar)
    def __repr__(self):
        return f"Vector({self.x}, {self.y})"</div>
<div class="tip">特殊メソッドはPythonの「プロトコル」です。実装することで標準の演算子・関数・構文が使えるようになります。</div>
    `,
    code: `class Vector:
    def __init__(self, x: float, y: float):
        self.x, self.y = x, y

    def __repr__(self) -> str:
        return f"Vector({self.x}, {self.y})"

    def __add__(self, other: "Vector") -> "Vector":
        return Vector(self.x + other.x, self.y + other.y)

    def __sub__(self, other: "Vector") -> "Vector":
        return Vector(self.x - other.x, self.y - other.y)

    def __mul__(self, scalar: float) -> "Vector":
        return Vector(self.x * scalar, self.y * scalar)

    def __abs__(self) -> float:
        return (self.x**2 + self.y**2) ** 0.5

    def __eq__(self, other: object) -> bool:
        if not isinstance(other, Vector):
            return False
        return self.x == other.x and self.y == other.y

    def __iter__(self):
        yield self.x
        yield self.y

v1 = Vector(3, 4)
v2 = Vector(1, 2)

print(v1 + v2)
print(v1 - v2)
print(v1 * 3)
print(abs(v1))       # √(9+16) = 5.0
print(v1 == Vector(3, 4))
x, y = v1            # __iter__ でアンパック
print(f"x={x}, y={y}")`,

      explanation: "正解！ __len__ を定義すると len() 関数に対応できます。リストや辞書も内部的に __len__ を持っています。"

from typing import Any, Optional, ClassVar

# ===== フィールド定義 =====
class Field:
    def __init__(self, type_: type, required: bool = True):
        self.type_ = type_
        self.required = required
        self.name: str = ""

    def __set_name__(self, owner, name: str):
        self.name = name

    def __get__(self, obj, objtype=None):
        if obj is None:
            return self
        return obj.__dict__.get(f"_{self.name}")

    def __set__(self, obj, value):
        if value is None and self.required:
            raise ValueError(f"{self.name} は必須です")
        if value is not None and not isinstance(value, self.type_):
            raise TypeError(f"{self.name}: {self.type_.__name__} が必要です")
        obj.__dict__[f"_{self.name}"] = value

# ===== ミニORM =====
class ModelMeta(type):
    def __new__(mcs, name, bases, namespace):
        fields = {k: v for k, v in namespace.items() if isinstance(v, Field)}
        cls = super().__new__(mcs, name, bases, namespace)
        cls._fields = fields
        cls._table: list = []
        return cls

class Model(metaclass=ModelMeta):
    _id_counter: ClassVar[int] = 0

    def __init__(self, **kwargs):
        type(self)._id_counter += 1
        self.id = type(self)._id_counter
        for name, field_obj in type(self)._fields.items():
            setattr(self, name, kwargs.get(name))

    def __repr__(self) -> str:
        vals = ", ".join(f"{n}={getattr(self, n)!r}" for n in type(self)._fields)
        return f"{type(self).__name__}(id={self.id}, {vals})"

    def save(self):
        type(self)._table.append(self)
        return self

    @classmethod
    def all(cls) -> list:
        return list(cls._table)

    @classmethod
    def filter(cls, **kwargs) -> list:
        return [r for r in cls._table
                if all(getattr(r, k) == v for k, v in kwargs.items())]

// ==================== APP STATE ====================
let currentLesson = 0;
let points = 0;
let completed = new Set();
let quizAnswered = false;

function init() {
  renderSidebar();
  loadLesson(0);
}

function renderSidebar() {
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  let lastChapter = '';
  lessons.forEach((lesson, i) => {
    if (lesson.chapter !== lastChapter) {
      const ch = document.createElement('div');
      ch.className = 'chapter';
      ch.textContent = lesson.chapter;
      list.appendChild(ch);
      lastChapter = lesson.chapter;
    }
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (i === currentLesson ? ' active' : '');
    btn.innerHTML = `<span class="icon">${lesson.icon}</span>${lesson.title}` +
      (completed.has(i) ? '<span class="check">✓</span>' : '');
    btn.onclick = () => loadLesson(i);
    list.appendChild(btn);
  });
}

function loadLesson(idx) {
  currentLesson = idx;
  quizAnswered = false;
  const lesson = lessons[idx];
  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('lesson-badge').textContent = `レッスン ${idx + 1} / ${lessons.length}`;
  document.getElementById('level-badge').textContent = lesson.level;
  document.getElementById('lesson-content').innerHTML = lesson.content;
  document.getElementById('code-editor').value = lesson.code;
  clearOutput();

  const quizArea = document.getElementById('quiz-area');
  quizArea.style.display = 'block';
  document.getElementById('quiz-question').textContent = lesson.quiz.q;
  const optsEl = document.getElementById('quiz-options');
  optsEl.innerHTML = '';
  lesson.quiz.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(i, btn);
    optsEl.appendChild(btn);
  });
  document.getElementById('quiz-feedback').style.display = 'none';
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').textContent = idx === lessons.length - 1 ? '完了 🎉' : '次へ →';
  renderSidebar();
  updateProgress();
}

  if (quizAnswered) return;
  quizAnswered = true;
  const lesson = lessons[currentLesson];

let pyodide = null;

async function initPyodide() {
  const btn = document.getElementById('run-btn');
  btn.textContent = '読込中...';
  btn.disabled = true;
  try {
    pyodide = await loadPyodide();
    btn.textContent = '▶ 実行';
    btn.disabled = false;
  } catch(e) {
    btn.textContent = '❌ 読込失敗';
    console.error(e);
  }
}
initPyodide();

async function runCode() {
  const code = document.getElementById('code-editor').value;
  const output = document.getElementById('output');
  output.innerHTML = '';
  if (!pyodide) {
    output.innerHTML = '<span class="out-hint">Pythonを読み込み中です。少し待ってから再試行してください。</span>';
    return;
  }
  try {
    pyodide.globals.set('_user_code', code);
    const result = await pyodide.runPythonAsync(`
import sys, io, traceback
_buf = io.StringIO()
_err_buf = io.StringIO()
_old_out, _old_err = sys.stdout, sys.stderr
sys.stdout, sys.stderr = _buf, _err_buf
try:
    exec(_user_code)
except Exception:
    print(traceback.format_exc(), file=_err_buf)
finally:
    sys.stdout, sys.stderr = _old_out, _old_err
(_buf.getvalue(), _err_buf.getvalue())
`);
    const [stdout, stderr] = result.toJs();
    if (stdout) {
      const span = document.createElement('span');
      span.className = 'out-ok';
      span.textContent = stdout;
      output.appendChild(span);
    }
    if (stderr) {
      const span = document.createElement('span');
      span.className = 'out-err';
      span.textContent = stderr;
      output.appendChild(span);
    }
  } catch(e) {
    const span = document.createElement('span');
    span.className = 'out-err';
    span.textContent = '⚠️ エラー: ' + e.message;
    output.appendChild(span);
  }
  if (!output.innerHTML) {
    output.innerHTML = '<span class="out-hint">（出力なし）</span>';
  }
}

function resetCode() {
  document.getElementById('code-editor').value = lessons[currentLesson].code;

document.getElementById('code-editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart;
    this.value = this.value.substring(0, s) + '    ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = s + 4;
  }
});
