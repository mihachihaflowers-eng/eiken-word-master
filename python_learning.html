<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python はじめの一歩</title>

<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --card: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #3ecf8e;
    --red: #f06a6a;
    --yellow: #f5c842;
    --text: #e2e8f0;
    --muted: #8892a4;
    --border: #2d3248;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 260px; min-width: 260px; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #sidebar h2 {
    padding: 18px 16px 12px; font-size: 14px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border);
  }
  .chapter { padding: 8px 16px 4px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 8px; }
  .lesson-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer; transition: background 0.15s;
    border: none; background: none; color: var(--text); width: 100%; text-align: left;
    font-size: 13.5px; border-radius: 0;
  }
  .lesson-btn:hover { background: var(--card); }
  .lesson-btn.active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .lesson-btn .icon { font-size: 16px; width: 20px; text-align: center; }
  .lesson-btn .check { margin-left: auto; color: var(--green); font-size: 14px; }
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; background: var(--panel);
  }
  #topbar h1 { font-size: 18px; font-weight: 600; }
  #topbar .badge {
    background: rgba(79,142,247,0.2); color: var(--accent);
    padding: 3px 10px; border-radius: 20px; font-size: 12px;
  }
  #topbar .pts { margin-left: auto; color: var(--yellow); font-weight: 700; font-size: 14px; }

  /* Content split */
  #content-area { flex: 1; display: flex; overflow: hidden; }

  /* Lesson panel */
  #lesson-panel {
    width: 50%; border-right: 1px solid var(--border);
    overflow-y: auto; padding: 28px 28px 40px;
  }
  #lesson-panel h2 { font-size: 22px; margin-bottom: 16px; }
  #lesson-panel p { line-height: 1.75; color: #c8d0e0; margin-bottom: 14px; font-size: 14.5px; }
  #lesson-panel h3 { margin: 20px 0 10px; font-size: 16px; color: var(--accent); }
  #lesson-panel .highlight {
    background: var(--card); border-left: 3px solid var(--accent);
    padding: 14px 16px; border-radius: 0 8px 8px 0; margin: 14px 0;
    font-size: 13.5px; line-height: 1.7; color: #d4dff7;
  }
  #lesson-panel .tip {
    background: rgba(62,207,142,0.08); border: 1px solid rgba(62,207,142,0.3);
    border-radius: 8px; padding: 12px 16px; margin: 14px 0; font-size: 13.5px;
  }
  #lesson-panel .tip::before { content: "💡 "; }
  #lesson-panel .warning {
    background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.3);
    border-radius: 8px; padding: 12px 16px; margin: 14px 0; font-size: 13.5px;
  }

  /* Code panel */
  #code-panel {
    width: 50%; display: flex; flex-direction: column; background: var(--bg);
  }
  #code-toolbar {
    padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #code-toolbar span { font-size: 13px; color: var(--muted); }
  #run-btn {
    margin-left: auto; background: var(--green); color: #000; border: none;
    padding: 7px 20px; border-radius: 6px; font-weight: 700; cursor: pointer;
    font-size: 13px; transition: opacity 0.15s;
  }
  #run-btn:hover { opacity: 0.85; }
  #reset-btn {
    background: var(--card); color: var(--muted); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #code-editor {
    flex: 1; background: #0d1117; color: #e6edf3; font-family: 'Consolas', 'Courier New', monospace;
    font-size: 14px; line-height: 1.6; padding: 16px; border: none; outline: none; resize: none;
    tab-size: 4;
  }
  #output-area {
    height: 160px; border-top: 1px solid var(--border); display: flex; flex-direction: column;
  }
  #output-label {
    padding: 8px 16px; font-size: 12px; color: var(--muted); background: var(--panel);
    border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
  }
  #clear-btn {
    margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px;
  }
  #output {
    flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'Consolas', monospace;
    font-size: 13px; line-height: 1.6; background: #080b10; white-space: pre-wrap;
  }
  #output .out-ok { color: #7ee8a2; }
  #output .out-err { color: var(--red); }
  #output .out-hint { color: var(--muted); font-style: italic; }

  /* Quiz */
  #quiz-area { display: none; margin-top: 24px; }
  #quiz-area h3 { color: var(--yellow); margin-bottom: 12px; font-size: 16px; }
  .quiz-q { font-size: 14.5px; margin-bottom: 14px; line-height: 1.6; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .quiz-opt {
    background: var(--card); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13.5px; transition: all 0.15s; text-align: left;
    color: var(--text);
  }
  .quiz-opt:hover { border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .quiz-opt.correct { background: rgba(62,207,142,0.15); border-color: var(--green); color: var(--green); }
  .quiz-opt.wrong { background: rgba(240,106,106,0.15); border-color: var(--red); color: var(--red); }
  #quiz-feedback { font-size: 14px; padding: 10px 14px; border-radius: 8px; margin-top: 8px; display: none; }
  #quiz-feedback.ok { background: rgba(62,207,142,0.1); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  #quiz-feedback.ng { background: rgba(240,106,106,0.1); color: var(--red); border: 1px solid rgba(240,106,106,0.3); }

  /* Nav buttons */
  #nav-buttons { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: var(--panel); }
  .nav-btn {
    padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: opacity 0.15s;
  }
  #prev-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  #next-btn { background: var(--accent); color: #fff; margin-left: auto; }
  #prev-btn:hover, #next-btn:hover { opacity: 0.85; }
  #next-btn:disabled { opacity: 0.4; cursor: default; }

  /* Completion */
  #completion { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; }
  #completion .trophy { font-size: 80px; margin-bottom: 24px; }
  #completion h2 { font-size: 28px; margin-bottom: 12px; }
  #completion p { color: var(--muted); font-size: 16px; }
</style>
</head>

// ===================== APP STATE =====================
let currentLesson = 0;
let points = 0;
let completed = new Set();
let quizAnswered = false;

// ===================== INIT =====================
function init() {
  renderSidebar();
  loadLesson(0);
}

function renderSidebar() {
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  let lastChapter = '';
  lessons.forEach((lesson, i) => {
    if (lesson.chapter !== lastChapter) {
      const ch = document.createElement('div');
      ch.className = 'chapter';
      ch.textContent = lesson.chapter;
      list.appendChild(ch);
      lastChapter = lesson.chapter;
    }
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (i === currentLesson ? ' active' : '');
    btn.innerHTML = `<span class="icon">${lesson.icon}</span>${lesson.title}` +
      (completed.has(i) ? '<span class="check">✓</span>' : '');
    btn.onclick = () => loadLesson(i);
    list.appendChild(btn);
  });
}

function loadLesson(idx) {
  currentLesson = idx;
  quizAnswered = false;
  const lesson = lessons[idx];

  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('lesson-badge').textContent = `レッスン ${idx + 1} / ${lessons.length}`;
  document.getElementById('lesson-content').innerHTML = lesson.content;
  document.getElementById('code-editor').value = lesson.code;
  clearOutput();

  // Quiz
  const quizArea = document.getElementById('quiz-area');
  quizArea.style.display = 'block';
  document.getElementById('quiz-question').textContent = lesson.quiz.q;
  const optsEl = document.getElementById('quiz-options');
  optsEl.innerHTML = '';
  lesson.quiz.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(i, btn);
    optsEl.appendChild(btn);
  });
  document.getElementById('quiz-feedback').style.display = 'none';

  // Nav
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').textContent = idx === lessons.length - 1 ? '完了 🎉' : '次へ →';

  renderSidebar();
  updateProgress();
}

function answerQuiz(selected, btnEl) {
  if (quizAnswered) return;
  quizAnswered = true;
  const lesson = lessons[currentLesson];
  const opts = document.querySelectorAll('.quiz-opt');
  const fb = document.getElementById('quiz-feedback');

  opts.forEach(b => b.style.pointerEvents = 'none');
  opts[lesson.quiz.ans].classList.add('correct');

  if (selected === lesson.quiz.ans) {
    btnEl.classList.add('correct');
    fb.className = 'ok';
    fb.textContent = '✅ ' + lesson.quiz.explanation;
    if (!completed.has(currentLesson)) {
      points += 10;
      completed.add(currentLesson);
      document.getElementById('pts-display').textContent = `⭐ ${points} pt`;
    }
  } else {
    btnEl.classList.add('wrong');
    fb.className = 'ng';
    fb.textContent = '❌ 惜しい！正解は「' + lesson.quiz.opts[lesson.quiz.ans] + '」。' + lesson.quiz.explanation;
    completed.add(currentLesson);
  }
  fb.style.display = 'block';
  updateProgress();
  renderSidebar();
}

function updateProgress() {
  const pct = Math.round((completed.size / lessons.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
}

function prevLesson() {
  if (currentLesson > 0) loadLesson(currentLesson - 1);
}

function nextLesson() {
  if (currentLesson < lessons.length - 1) {
    loadLesson(currentLesson + 1);
  } else {
    showCompletion();
  }
}

function showCompletion() {
  document.getElementById('content-area').innerHTML = `
    <div id="completion" style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center;padding:40px;">
      <div style="font-size:80px;margin-bottom:24px;">🏆</div>
      <h2 style="font-size:28px;margin-bottom:12px;">全レッスン完了！</h2>
      <p style="color:#8892a4;font-size:16px;margin-bottom:8px;">獲得ポイント: ⭐ ${points} pt</p>
      <p style="color:#8892a4;font-size:15px;margin-top:16px;">Python基礎をマスターしました！<br>次はファイル操作・クラス・ライブラリに挑戦しよう！</p>
      <button onclick="loadLesson(0)" style="margin-top:32px;padding:12px 32px;background:#4f8ef7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">最初から復習する</button>
    </div>`;
  document.getElementById('nav-buttons').style.display = 'none';
}

// ===================== CODE EXECUTION =====================
let pyodide = null;

async function initPyodide() {
  const btn = document.getElementById('run-btn');
  btn.textContent = '読込中...';
  btn.disabled = true;
  try {
    pyodide = await loadPyodide();
    btn.textContent = '▶ 実行';
    btn.disabled = false;
  } catch(e) {
    btn.textContent = '❌ 読込失敗';
    console.error('Pyodide load error:', e);
  }
}
initPyodide();

async function runCode() {
  const code = document.getElementById('code-editor').value;
  const output = document.getElementById('output');
  output.innerHTML = '';

  if (!pyodide) {
    output.innerHTML = '<span class="out-hint">Pythonを読み込み中です。少し待ってから再試行してください。</span>';
    return;
  }

  try {
    pyodide.globals.set('_user_code', code);
    const result = await pyodide.runPythonAsync(`
import sys, io, traceback
_buf = io.StringIO()
_err_buf = io.StringIO()
_old_out, _old_err = sys.stdout, sys.stderr
sys.stdout, sys.stderr = _buf, _err_buf
try:
    exec(_user_code)
except Exception:
    print(traceback.format_exc(), file=_err_buf)
finally:
    sys.stdout, sys.stderr = _old_out, _old_err
(_buf.getvalue(), _err_buf.getvalue())
`);
    const [stdout, stderr] = result.toJs();
    if (stdout) {
      const span = document.createElement('span');
      span.className = 'out-ok';
      span.textContent = stdout;
      output.appendChild(span);
    }
    if (stderr) {
      const span = document.createElement('span');
      span.className = 'out-err';
      span.textContent = stderr;
      output.appendChild(span);
    }
  } catch(e) {
    const span = document.createElement('span');
    span.className = 'out-err';
    span.textContent = '⚠️ エラー: ' + e.message;
    output.appendChild(span);
  }

  if (!output.innerHTML) {
    output.innerHTML = '<span class="out-hint">（出力なし）</span>';
  }
}

function resetCode() {
  document.getElementById('code-editor').value = lessons[currentLesson].code;
  clearOutput();
}

function clearOutput() {
  document.getElementById('output').innerHTML = '<span class="out-hint">▶ 実行ボタンを押して結果を確認しよう</span>';
}

// Tab key in editor
document.getElementById('code-editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
  }
});

init();
</script>
